<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery · Storybook Summer</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .gallery-toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 24px;
      background: var(--white);
      border-bottom: 1.5px solid var(--cream-dark);
      position: sticky;
      top: var(--nav-height);
      z-index: 100;
      flex-wrap: wrap;
    }

    .view-btn {
      padding: 6px 14px;
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--cream-dark);
      background: var(--cream);
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--ink-light);
      transition: var(--transition);
    }
    .view-btn.active { background: var(--ink); color: var(--cream); border-color: var(--ink); }

    .gallery-container { padding: 24px; max-width: 1200px; margin: 0 auto; }

    /* Grid view */
    .gallery-grid-wall {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
    }

    .gallery-card { cursor: pointer; }

    .gallery-thumb {
      position: relative;
      aspect-ratio: 4/3;
      background: var(--cream-dark);
      overflow: hidden;
      border-radius: var(--radius-sm) var(--radius-sm) 0 0;
    }

    .gallery-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s ease;
    }
    .gallery-card:hover .gallery-img { transform: scale(1.05); }

    .gallery-play-icon {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      background: rgba(61,44,30,0.3);
      color: white;
    }

    /* Polaroid wall view */
    .gallery-polaroid-wall {
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      justify-content: center;
      padding: 16px 0;
    }

    .gallery-polaroid-wall .polaroid {
      width: 180px;
      cursor: pointer;
    }

    @media (max-width: 480px) {
      .gallery-polaroid-wall .polaroid { width: 140px; }
    }
  </style>
</head>
<body>
  <nav class="nav" id="main-nav"></nav>
  <div class="nav-mobile" id="mobile-nav"></div>

  <main class="page">
    <div class="page-header">
      <h1>📷 Gallery</h1>
      <p>Every photo, every moment, pinned to the wall.</p>
    </div>

    <!-- Toolbar -->
    <div class="gallery-toolbar" id="gallery-filters">
      <!-- filters rendered by gallery.js -->
    </div>

    <div style="display:flex;align-items:center;gap:8px;padding:10px 24px;background:var(--white);border-bottom:1.5px solid var(--cream-dark)">
      <span style="font-size:0.82rem;color:var(--ink-lighter);font-weight:700;margin-right:4px">View:</span>
      <button class="view-btn active" data-view="grid">⊞ Grid</button>
      <button class="view-btn" data-view="polaroid">🖼 Polaroids</button>
      <div style="margin-left:auto">
        <button class="btn btn-primary btn-sm" onclick="openModal('add-media-modal')">＋ Add Photo/Video</button>
      </div>
    </div>

    <div class="gallery-container">
      <div id="gallery-grid" class="gallery-grid-wall">
        <!-- rendered by gallery.js -->
      </div>
    </div>
  </main>

  <!-- Lightbox -->
  <div id="lightbox" class="lightbox-overlay">
    <div class="lightbox-content">
      <!-- filled by JS -->
    </div>
  </div>

  <!-- Add Media Modal -->
  <div class="modal-overlay" id="add-media-modal">
    <div class="modal">
      <div class="modal-header">
        <h2>📷 Add Photo or Video</h2>
        <button class="modal-close" onclick="closeModal('add-media-modal')">✕</button>
      </div>
      <div class="modal-body">
        <form id="add-media-form">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Type</label>
              <select name="type" class="form-select">
                <option value="image">🖼 Photo</option>
                <option value="video">🎬 Video</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Date</label>
              <input name="date" type="date" class="form-input">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">File path or URL</label>
            <input name="src" class="form-input" placeholder="assets/photos/my-photo.jpg" required>
            <div class="form-hint">Add the file to the assets/photos/ folder first, then put the path here.</div>
          </div>
          <div class="form-group">
            <label class="form-label">Caption</label>
            <input name="caption" class="form-input" placeholder="What's happening here?">
          </div>
          <div class="form-group">
            <label class="form-label">Place</label>
            <select name="stopId" id="gallery-stop" class="form-select">
              <option value="">— No place —</option>
            </select>
          </div>
          <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:8px">
            <button type="button" class="btn btn-outline" onclick="closeModal('add-media-modal')">Cancel</button>
            <button type="submit" class="btn btn-primary">📷 Add to Gallery</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
  <script src="js/gallery.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await GalleryPage.init();
      // Set today as default date
      const d = document.querySelector('#add-media-form input[name="date"]');
      if (d) d.value = new Date().toISOString().slice(0, 10);
    });
  </script>
</body>
</html>
